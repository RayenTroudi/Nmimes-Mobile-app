name: Flutter CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - run: >
          flutter build apk --release
          --dart-define=SUPABASE_URL=https://vebmbkbmmglgpwwmwevk.supabase.co
          --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlYm1ia2JtbWdsZ3B3d213ZXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MjQzMDgsImV4cCI6MjA5ODUwMDMwOH0.5YHlcnRFTsqbmAk_Ng206L4IW9CBM60HXIt3K6VR43E

      - run: npm install -g firebase-tools

      - run: |
          firebase appdistribution:distribute \
          build/app/outputs/flutter-apk/app-release.apk \
          --app ${{ secrets.FIREBASE_APP_ID }} \
          --groups testers \
          --token ${{ secrets.FIREBASE_TOKEN }}