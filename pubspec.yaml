name: nmimes
description: "Nmimes learning app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.3.0
  camera: ^0.11.0+2
  camera_android: ^0.10.9+15
  image_picker: ^1.1.2
  supabase_flutter: ^2.8.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/nmimes_logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
